{% extends 'base_publica.html' %}
{% block titulo %}Login — Livraria Virtual{% endblock %}

{% block conteudo %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header text-center mb-4">
      <i class="bi bi-book-half auth-icon"></i>
      <h2 class="auth-title">Bem-vindo de volta</h2>
      <p class="auth-sub">Acesse sua conta Biblion</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="seu@email.com" required>
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label">Senha</label>
        <input type="password" id="senha" name="senha" class="form-control"
               placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-amber w-100">Entrar</button>
    </form>

    <p class="text-center mt-3 mb-0 auth-link">
      Não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se aqui</a>
    </p>
  </div>
</div>
{% endblock %}
