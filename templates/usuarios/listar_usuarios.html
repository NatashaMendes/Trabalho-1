{% extends 'base.html' %}
<!-- Diz que este template herda de outro chamado 'base.html'. 
     Isso evita repetir cabeçalho, rodapé e estrutura padrão em todas as páginas. -->

{% block titulo %}Usuários — Livraria Virtual{% endblock %}
<!-- {% block titulo %}: abre um bloco chamado titulo.
Esse bloco é usado no base.html dentro da tag <title>.
Assim, cada página filha pode sobrescrever o título exibido na aba do navegador.
Usuários — Livraria Virtual: é o texto que será mostrado como título da página.
Aqui, indica que a página é dedicada à listagem ou gerenciamento de usuários, mantendo o padrão da aplicação (“Livraria Virtual”).
{% endblock %}: fecha o bloco, indicando que o conteúdo do título terminou. -->

{% block conteudo %}
<!-- Início do bloco principal de conteúdo da página. -->



<div class="card table-card">
<!-- Cria um card (caixa estilizada do Bootstrap) para envolver a tabela.
A classe table-card provavelmente é personalizada no seu CSS para dar estilo específico a cards que contêm tabelas. -->

  <div class="card-body p-0">
  <!-- Área interna do card.
  p-0 remove o padding interno, permitindo que a tabela ocupe toda a largura sem espaçamento extra. -->

    <table class="table table-hover table-bordered mb-0 biblion-table">
    <!-- Cria a tabela em si.
    table aplica estilo padrão do Bootstrap.
    table-hover adiciona efeito de destaque quando o usuário passa o mouse sobre uma linha.
    table-bordered coloca bordas em todas as células.
    mb-0 remove a margem inferior da tabela.
    biblion-table é provavelmente uma classe personalizada para ajustes visuais. -->

      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Perfil</th>
          <th class="text-center">Ações</th>
          <!-- <thead> define o cabeçalho da tabela.
          <tr> cria uma linha de cabeçalho.
          Cada <th> é uma coluna:
          #: normalmente usado para numeração ou ID.
          Nome: nome completo do usuário.
          E-mail: endereço de e-mail.
          Perfil: tipo de acesso (Admin, Editor, Leitor).
          Ações: coluna reservada para botões de editar, excluir, etc.
          class="text-center" centraliza o conteúdo da coluna de ações. -->
      
        </tr>


      </thead>
      <tbody>
        {% for u in usuarios %}
        <!-- Inicia um loop que percorre a lista usuarios.
        Para cada objeto u (usuário), será criada uma linha (<tr>) na tabela. -->

        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.nome }}</td>
          <td>{{ u.email }}</td>
          <td><span class="badge-perfil badge-perfil-{{ u.perfil|lower }}">{{ u.perfil }}</span></td>
          <!--   <td><span class="badge-perfil badge-perfil-{{ u.perfil|lower }}">{{ u.perfil }}</span></td>
          Cria uma linha da tabela (<tr>).
          Cada <td> exibe uma informação do usuário:
          {{ u.id }} → ID do usuário.
          {{ u.nome }} → Nome completo.
          {{ u.email }} → Endereço de e-mail.
          {{ u.perfil }} → Perfil de acesso (Admin, Editor, Leitor).
          O perfil é envolvido em um <span> com classes dinâmicas:
          badge-perfil é estilo base.
          badge-perfil-{{ u.perfil|lower }} aplica uma classe específica conforme o perfil (ex: badge-perfil-admin, badge-perfil-editor, badge-perfil-leitor).
          Isso permite diferenciar visualmente os perfis com cores ou estilos distintos. -->

          <td class="text-center">
            <button class="btn btn-sm btn-outline-secondary me-1" title="Editar">
              <i class="bi bi-pencil"></i>
            </button>
            <!-- Cria a célula de ações.
            class="text-center" centraliza os botões.
            O primeiro botão é de edição:
            btn btn-sm btn-outline-secondary → botão pequeno, estilo secundário.
            me-1 → margem à direita para espaçamento.
            Ícone bi bi-pencil → representa edição.
            title="Editar" → tooltip que aparece ao passar o mouse. -->

            <button class="btn btn-sm btn-outline-danger" title="Excluir"
                    onclick="confirmarExclusao(event, '{{ u.nome }}')">
              <i class="bi bi-trash"></i>
            </button>
            <!-- btn btn-sm btn-outline-danger
            Cria um botão pequeno (btn-sm) com estilo de alerta (btn-outline-danger), que normalmente aparece em vermelho para indicar ação destrutiva.
            title="Excluir"
            Define o texto que aparece como tooltip ao passar o mouse sobre o botão.
            Ajuda na acessibilidade e clareza da ação.
            onclick="confirmarExclusao(event, '{{ u.nome }}')"
            Define uma função JavaScript que será chamada quando o botão for clicado.
            A função confirmarExclusao recebe o evento e o nome do usuário ({{ u.nome }}) como parâmetro.
            Isso permite exibir uma mensagem de confirmação personalizada, como: “Deseja realmente excluir o usuário João?” antes de prosseguir com a exclusão.
            <i class="bi bi-trash"></i>
            Ícone de lixeira do Bootstrap Icons, representando exclusão.
            Reforça visualmente a ação do botão. -->


          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
<!-- Fim do bloco de conteúdo -->
