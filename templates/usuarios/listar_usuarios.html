{% extends 'base.html' %}
{% block titulo %}Usuários — Livraria Virtual{% endblock %}

{% block conteudo %}
<div class="page-header d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="page-title"><i class="bi bi-people me-2"></i>Usuários</h2>
    <p class="page-sub mb-0">Gerencie os usuários do sistema</p>
  </div>
  <a href="{{ url_for('inserir_usuario') }}" class="btn btn-amber">
    <i class="bi bi-plus-lg me-1"></i> Novo Usuário
  </a>
</div>

<div class="card table-card">
  <div class="card-body p-0">
    <table class="table table-hover table-bordered mb-0 biblion-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Perfil</th>
          <th class="text-center">Ações</th>
        </tr>
      </thead>
      <tbody>
        {% for u in usuarios %}
        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.nome }}</td>
          <td>{{ u.email }}</td>
          <td><span class="badge-perfil badge-perfil-{{ u.perfil|lower }}">{{ u.perfil }}</span></td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-secondary me-1" title="Editar">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" title="Excluir"
                    onclick="confirmarExclusao(event, '{{ u.nome }}')">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
