<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre a equipe envolvida</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">(texto a inserir)</a>
    </div>
  </nav>

  <div class="container mt-5">

    <h2 class="mb-4">(texto a inserir)</h2>

    <!-- row: uma linha do sistema de grid do Bootstrap -->
    <div class="row">

      <!-- col-md-4: em telas médias (md) ou maiores, cada card ocupa 4 colunas
           (4 + 4 + 4 = 12 — três colunas iguais lado a lado)
           Em telas pequenas (celular), cada card ocupa a linha inteira -->
      <div class="col-md-4 mb-4">
        <!-- card: componente Bootstrap para conteúdo agrupado -->
        <div class="card h-100">
          <!-- card-body: área interna do card com padding automático -->
          <div class="card-body">
            <!-- card-title: título do card em negrito -->
            <h5 class="card-title">(texto a inserir)</h5>
            <!-- card-text: texto descritivo do card -->
            <p class="card-text">
             (texto a inserir)
            </p>
          </div>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">(texto a inserir)</h5>
            <p class="card-text">
              (texto a inserir)
            </p>
          </div>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">(texto a inserir)</h5>
            <p class="card-text">
              (texto a inserir)
            </p>
          </div>
        </div>
      </div>

    </div>
    <!-- Fim da row -->

    <a href="/" class="btn btn-secondary">← Voltar</a>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
